name: Lint Docker Files

on:
  push:
    paths:
      - "**Dockerfile"
  pull_request:
    paths:
      - "**Dockerfile"

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - uses: hadolint/hadolint-action@v1.6.0
        with:
          dockerfile: ./todo/Dockerfile